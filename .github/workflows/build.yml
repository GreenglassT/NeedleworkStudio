name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: mac
            target-args: "--mac --arm64"
            artifact-suffix: "arm64-Apple"
            artifact-name: "Needlework-Studio-macOS-arm64"
            artifact-glob: |
              electron/dist/*.dmg
              electron/dist/*.zip
              electron/dist/*.yml
            build-backend: bash build_backend.sh
          - os: macos-15-intel
            target: mac
            target-args: "--mac --x64"
            artifact-suffix: "x64-Intel"
            artifact-name: "Needlework-Studio-macOS-x64"
            artifact-glob: |
              electron/dist/*.dmg
              electron/dist/*.zip
              electron/dist/*.yml
            build-backend: bash build_backend.sh
          - os: windows-latest
            target: win
            target-args: "--win --x64"
            artifact-name: "Needlework-Studio-Windows"
            artifact-glob: |
              electron/dist/*.exe
              electron/dist/*.yml
            build-backend: powershell -ExecutionPolicy Bypass -File build_backend.ps1
          - os: ubuntu-latest
            target: linux
            target-args: "--linux --x64"
            artifact-name: "Needlework-Studio-Linux"
            artifact-glob: |
              electron/dist/*.AppImage
              electron/dist/*.deb
              electron/dist/*.yml
            build-backend: bash build_backend.sh

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron/package-lock.json

      - name: Install Node dependencies
        working-directory: electron
        run: npm ci

      - name: Build backend
        run: ${{ matrix.build-backend }}

      - name: Build and publish
        working-directory: electron
        shell: bash
        run: |
          EXTRA=""
          if [ -n "$ARTIFACT_SUFFIX" ]; then
            EXTRA="-c.mac.artifactName=Needlework-Studio-\${version}-${ARTIFACT_SUFFIX}.\${ext}"
          fi
          npx electron-builder ${{ matrix.target-args }} $EXTRA --publish onTag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARTIFACT_SUFFIX: ${{ matrix.artifact-suffix }}

      - name: Upload artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: error

  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
