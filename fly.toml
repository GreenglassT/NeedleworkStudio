app = "needlework-studio-demo"
primary_region = "iad"

[build]

[env]
  DEMO_MODE = "1"
  HTTPS = "true"
  PORT = "6969"
  NEEDLEWORK_DATA_DIR = "/data"

[http_service]
  internal_port = 6969
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 25

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[mounts]
  source = "needlework_data"
  destination = "/data"
