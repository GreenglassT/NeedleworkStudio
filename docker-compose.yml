services:
  needlework-studio:
    build: .
    ports:
      - "6969:6969"
    volumes:
      - needlework-data:/data
    environment:
      - PORT=6969
      # Set ADMIN_USERNAME to promote a user to admin on startup
      # - ADMIN_USERNAME=your_username
    restart: unless-stopped

    # After first start, create your admin user:
    #   docker compose exec needlework-studio python manage_users.py create
    #   docker compose exec needlework-studio python manage_users.py admin

volumes:
  needlework-data:
