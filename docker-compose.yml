services:
  needlework-studio:
    build: .
    ports:
      - "6969:6969"
    volumes:
      - needlework-data:/data
    environment:
      - PORT=6969
      # Set ADMIN_USERNAME to promote a user to admin on startup
      # - ADMIN_USERNAME=your_username
    restart: unless-stopped

volumes:
  needlework-data:
